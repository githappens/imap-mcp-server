name: Accept (fast-forward merge)

# Add the `accept` label to a reviewed PR (e.g. an upstream-sync PR) and this
# fast-forwards `main` to the PR's branch — no merge commit, upstream SHAs
# preserved. It is a pure git ref move: it NEVER runs, builds, or interprets the
# PR's code, so there is no injection surface even though it has contents:write.
# A human adding the label is the only trigger (only collaborators can label).
#
# If `main` has advanced and the branch no longer fast-forwards, it fails loudly:
# comments why, removes the label, and does not force anything.

on:
  # pull_request_target (not pull_request): the workflow file is read from the
  # DEFAULT branch, so it triggers even though the labeled PR's branch predates
  # this file. Safe here ONLY because this job never checks out or runs the PR's
  # code — it just fast-forwards a git ref. Do not add code-executing steps.
  pull_request_target:
    types: [labeled]

permissions: {}

concurrency:
  group: ff-merge-main       # serialize merges into main
  cancel-in-progress: false

jobs:
  ff-merge:
    if: github.event.label.name == 'accept' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write         # fast-forward push to main
      pull-requests: write     # comment / manage the label
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward main to the reviewed branch
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$HEAD_REF"

          # --ff-only refuses (non-zero) if main is not an ancestor of the branch.
          if git merge --ff-only "origin/$HEAD_REF"; then
            git push origin main
            gh pr comment "$PR" --body "✅ Fast-forwarded \`main\` to \`$HEAD_REF\` (no merge commit; upstream SHAs preserved). GitHub will mark this PR merged."
            git push origin --delete "$HEAD_REF" || true
          else
            gh pr comment "$PR" --body "❌ Cannot fast-forward: \`main\` has moved since \`$HEAD_REF\` was cut, so accepting it would need a merge/rebase. Rebase the branch on \`main\` (or merge manually), then re-add the \`accept\` label."
            gh pr edit "$PR" --remove-label accept || true
            exit 1
          fi
